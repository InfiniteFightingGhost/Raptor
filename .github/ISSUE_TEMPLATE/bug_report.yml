name: Bug Report
description: Create a report to help us fix a bug or runtime exception in Raptor.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thank you for reporting a bug in Raptor! Please fill out the details below.
  - type: input
    id: summary
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproduction Code
      description: Provide a minimal `.rapt`, `.rasm`, or C# embedding code snippet that reproduces the issue.
      render: csharp
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: ".NET SDK version, OS (Windows/macOS/Linux), CPU architecture (x64/arm64)."
      placeholder: ".NET 10.0.1, Ubuntu 24.04 LTS, x64"
    validations:
      required: true
